[env]
TERM = "xterm-256color"

[window]
padding.x = 0
padding.y = 2
dynamic_padding = true
decorations = "None"
opacity = 0.8
startup_mode = "Fullscreen"

[cursor]
style = { shape = "Block", blinking = "Off" }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" }
]
