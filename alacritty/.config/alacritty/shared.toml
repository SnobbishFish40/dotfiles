[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 2
decorations = "None"
opacity = 0.8
startup_mode = "Fullscreen"

[cursor]
style = { shape = "Block", blinking = "Off" }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" },
{ key = "[", mods = "Control", action = "ToggleViMode"}
]
